<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kajcaferedeem.com</title>
<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#ffe4e6,#fef3c7,#dcfce7)}
.wrap{max-width:900px;margin:auto;padding:24px}
.hero,.card{background:white;border-radius:20px;padding:24px;margin-top:20px;text-align:center;box-shadow:0 10px 24px rgba(0,0,0,.1)}
h1{color:#ef4444;font-size:48px;margin:0}
input{padding:12px;border-radius:10px;border:2px solid #ccc;width:220px}
button{padding:12px 16px;border:none;border-radius:10px;background:#ef4444;color:white;font-weight:bold;cursor:pointer}
.result{margin-top:12px;font-weight:bold}
.footer{text-align:center;margin-top:20px;font-weight:bold}
</style>
</head>
<body>
<div class="wrap">
<div class="hero">
<h1>KAJ CAFE</h1>
<p>Coupon Redeem Page</p>
<p><strong>Owned by Joshler, Kobe & Jaylyn</strong></p>
</div>

<div class="card">
<h2>Redeem Coupon</h2>
<input id="coupon" placeholder="Enter code">
<button onclick="redeem()">Redeem</button>
<div id="result" class="result"></div>
</div>

<div class="card">
<h2>Example Codes</h2>
<p><b>KAJ10</b> – 10% off</p>
<p><b>FRUITATTACK</b> – $1 off Fruit Attack</p>
<p><b>STICK2</b> – $0.50 off any stick</p>
</div>

<div class="footer">kajcaferedeem.com</div>
</div>

<script>
const coupons={
"KAJ10":"You got 10% off!",
"FRUITATTACK":"$1 off Fruit Attack!",
"STICK2":"$0.50 off any stick!"
};

function redeem(){
let code=document.getElementById("coupon").value.toUpperCase();
let result=document.getElementById("result");

if(coupons[code]){
result.innerHTML=coupons[code];
result.style.color="green";
}else{
result.innerHTML="Invalid code";
result.style.color="red";
}
}
</script>
</body>
</html>
